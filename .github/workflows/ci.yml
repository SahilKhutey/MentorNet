name: MentorNet CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Build Web
        run: npm run build --workspace=apps/web

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Backend Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        if: env.DOCKER_PASSWORD != ''
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Tag Images
        run: |
          docker build -t mentornet-backend ./backend
          docker build -t mentornet-web ./apps/web

          # Tagging (using placeholders if secrets aren't set yet)
          USERNAME=${{ secrets.DOCKER_USERNAME || 'mentornet' }}
          docker tag mentornet-backend $USERNAME/mentornet-backend:latest
          docker tag mentornet-web $USERNAME/mentornet-web:latest

      - name: Push Images
        if: env.DOCKER_PASSWORD != ''
        run: |
          USERNAME=${{ secrets.DOCKER_USERNAME }}
          docker push $USERNAME/mentornet-backend:latest
          docker push $USERNAME/mentornet-web:latest
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
