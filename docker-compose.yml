version: "3.9"

services:
  backend:
    build: 
      context: .
      dockerfile: backend/Dockerfile
    container_name: mentornet_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://admin:password@db:5432/mentornet
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/data:/app/data # For persistent FAISS index

  db:
    image: postgres:15-alpine
    container_name: mentornet_db
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mentornet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mentornet"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mentornet_redis
    restart: always
    ports:
      - "6379:6379"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: mentornet_web
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://api.mentornet.ai/api/v1
      - NEXT_PUBLIC_SOCKET_URL=http://api.mentornet.ai
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: mentornet_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - backend

volumes:
  postgres_data:
